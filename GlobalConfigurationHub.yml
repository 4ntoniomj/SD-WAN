---
- name: Global configuration VyOS
  hosts: headquarters
  gather_facts: no
  connection: network_cli

  tasks:
    - name: Configuration
      vyos_config:
        lines:
          - set system host-name {{ inventory_hostname }}
          - set system name-server 1.1.1.1
          - set interfaces loopback lo address 127.0.0.1/32
          - set system login user vyos authentication public-keys namekey type ssh-ed25519
          - set system login user vyos authentication public-keys namekey key "{{ lookup('file', 'sshkey.pub') }}"
          - set service ssh disable-password-authentication
          - set interfaces ethernet eth0 description WAN
          - set interfaces ethernet eth1 description WAN
          - set system time-zone Europe/Madrid
          - set service ssh client-keepalive-interval 400
        save: true

    - name: Restart
      vyos_command:
        commands:
          - restart ssh
